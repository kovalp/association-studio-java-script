<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Association score demo.</title>
  <script type="module" crossorigin src="/association-studio-java-script/assets/index-BYa6Uu0E.js"></script>
  <link rel="stylesheet" crossorigin href="/association-studio-java-script/assets/index-Cs497Pdv.css">
</head>
<body>

<div id="orientation-warning">Please rotate your device to landscape mode.</div>

<div id="app-container">
    <div class="tool-panel" id="left-panel">
        <button id="reset-btn">Reset</button>
        <span class="tool-label" id="score-val" title="Axes-aligned GIoU">0</span>
    </div>
    <div class="tool-panel" id="top-panel">
        <input id="inp-x" type="number" value="0.0" min="-12.0" max="12" step="0.5" title="Position X">
        <input id="inp-y" type="number" value="0.0" min="-10.0" max="10" step="0.5" title="Position Y">
        <input id="inp-yaw" type="number" value="0.0" min="0.0" max="360.0" step="15" title="Orientation (yaw)">
        <input id="inp-len" type="number" value="3.0" min="0.2" max="15" step="0.5" title="Box Length (size x)">
        <input id="inp-wdt" type="number" value="1.5" min="0.2" max="5" step="0.5" title="Box Width (size y)">
    </div>

    <div id="stage">
        <canvas id="stage-ui" width="640" height="320"></canvas>
        <canvas id="stage-bg" width="640" height="320"></canvas>
    </div>
</div>


</body>
</html>
